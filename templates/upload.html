<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>File Upload and Print</title>
</head>
<body>
    <h1>Upload a File to Print</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="post" enctype="multipart/form-data">
        <label for="printer">Select Printer:</label>
        <select name="printer" id="printer" required>
            {% for printer_name, printer_info in printers.items() %}
            <option value="{{ printer_name }}">{{ printer_name }}</option>
            {% endfor %}
        </select><br><br>

        <label for="file">Choose file:</label>
        <input type="file" name="file" id="file" required><br><br>

        <input type="submit" value="Upload and Print">
    </form>
</body>
</html>
